<svg xmlns="http://www.w3.org/2000/svg" width="2500" height="1686" viewBox="0 0 2500 1686" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- Generic 6-zone rich-menu template (2500 × 1686). Replace with your own brand art.
       Tap-area coordinates for these zones are documented in docs/RICH_MENU.md. -->
  <defs>
    <style>
      .cell { fill: #ffffff; stroke: #e5e7eb; stroke-width: 3; }
      .label { fill: #1f2937; font-size: 64px; font-weight: 700; text-anchor: middle; }
      .icon  { font-size: 150px; text-anchor: middle; }
    </style>
  </defs>
  <rect width="2500" height="1686" fill="#f7f8fa"/>

  <!-- row 1 -->
  <rect class="cell" x="0"    y="0"   width="833" height="843"/>
  <rect class="cell" x="833"  y="0"   width="834" height="843"/>
  <rect class="cell" x="1667" y="0"   width="833" height="843"/>
  <!-- row 2 -->
  <rect class="cell" x="0"    y="843" width="833" height="843"/>
  <rect class="cell" x="833"  y="843" width="834" height="843"/>
  <rect class="cell" x="1667" y="843" width="833" height="843"/>

  <!-- row 1 content -->
  <text class="icon"  x="416"  y="380">🏠</text>
  <text class="label" x="416"  y="520">Home</text>
  <text class="icon"  x="1250" y="380">📋</text>
  <text class="label" x="1250" y="520">My Projects</text>
  <text class="icon"  x="2083" y="380">📤</text>
  <text class="label" x="2083" y="520">Submit</text>

  <!-- row 2 content -->
  <text class="icon"  x="416"  y="1223">📊</text>
  <text class="label" x="416"  y="1363">Status</text>
  <text class="icon"  x="1250" y="1223">📣</text>
  <text class="label" x="1250" y="1363">Events</text>
  <text class="icon"  x="2083" y="1223">💬</text>
  <text class="label" x="2083" y="1363">Help</text>
</svg>
